<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#071426">
<title>BE SAFE ACADEMY | Certificado de Honestidade Profissional</title>
<style>
:root{--bg:#071426;--card:#0d1f36;--line:#c79a3b;--txt:#f8f4ea;--muted:#b8c2d1;--cream:#fff4dc}
*{box-sizing:border-box}body{margin:0;min-height:100svh;font-family:Arial,system-ui,sans-serif;color:var(--txt);background:radial-gradient(circle at 10% 0,rgba(199,154,59,.24),transparent 34%),linear-gradient(135deg,#06111f,#0b1b30 55%,#050b14)}
header{padding:24px 18px 10px;text-align:center}.brand{display:inline-flex;align-items:center;gap:10px;padding:9px 16px;border:1px solid rgba(199,154,59,.5);border-radius:999px;background:rgba(255,255,255,.04);font-weight:900;letter-spacing:.05em}.logo{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#f3d27b,#9b6f1f);color:#071426}
h1{margin:16px 0 8px;font-size:clamp(28px,5vw,52px);line-height:1.05}.sub{max-width:840px;margin:auto;color:var(--muted);line-height:1.45}
main{width:min(1180px,94vw);margin:22px auto 48px;display:grid;grid-template-columns:350px 1fr;gap:20px;align-items:start}.panel,.preview{border:1px solid rgba(199,154,59,.28);border-radius:24px;background:rgba(13,31,54,.86);box-shadow:0 18px 55px rgba(0,0,0,.38);backdrop-filter:blur(10px)}.panel{padding:20px;position:sticky;top:16px}label{display:block;margin:0 0 8px;color:#ffe7ab;font-weight:900}input{width:100%;padding:14px 15px;border-radius:14px;border:1px solid rgba(255,255,255,.18);outline:0;background:#09182a;color:#fff;font-size:16px}input:focus{border-color:var(--line);box-shadow:0 0 0 3px rgba(199,154,59,.16)}.hint{margin:10px 0 16px;color:var(--muted);font-size:13px;line-height:1.45}button{width:100%;margin-top:10px;padding:14px 15px;border-radius:15px;border:0;font-size:15px;font-weight:900;cursor:pointer}button:active{transform:translateY(1px)}.primary{background:linear-gradient(135deg,#f4d27b,#b88625);color:#071426}.secondary{background:#102946;color:#fff;border:1px solid rgba(255,255,255,.15)}.ghost{background:#1b2432;color:#ffe7ab;border:1px solid rgba(199,154,59,.28)}.joke{margin-top:16px;padding:14px;border-left:4px solid var(--line);border-radius:16px;background:rgba(255,255,255,.05);color:#dfe7f2;font-size:14px;line-height:1.45}
.preview{padding:12px;overflow:auto}canvas{display:block;width:100%;height:auto;border-radius:14px;background:#f6ead2}.note{margin-top:12px;text-align:center;color:#8fa0b8;font-size:12px}
@media(max-width:900px){main{grid-template-columns:1fr}.panel{position:static}}
@media print{@page{size:landscape;margin:0}body{background:white}header,.panel,.note{display:none!important}main{display:block;width:100%;margin:0}.preview{padding:0;border:0;box-shadow:none;background:white}canvas{width:100vw;border-radius:0}}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="logo">BS</span>BE SAFE ACADEMY</div>
  <h1>Gerador Oficial de Não Especialista</h1>
  <p class="sub"></p>
</header>
<main>
  <section class="panel" aria-label="Configurações do certificado">
    <label for="nome">Nome do certificado</label>
    <input id="nome" maxlength="42" placeholder="Digite o nome aqui" autocomplete="off">
    <p class="hint"></p>
    <button class="primary" id="gerar">GERAR CERTIFICADO</button>
    <button class="secondary" id="png">BAIXAR PNG</button>
    <button class="secondary" id="pdf">SALVAR COMO PDF</button>
    <button class="ghost" id="limpar">LIMPAR NOME</button>
    <div class="joke" id="joke">Aprovado pelo comitê dos que preferem perguntar do que fazer besteira em produção.</div>
  </section>
  <section>
    <div class="preview"><canvas id="cert" width="1536" height="1024"></canvas></div>
    <div class="note">Certificado sem validade técnica, jurídica ou espiritual. Mas com excelente potencial de constrangimento elegante.</div>
  </section>
</main>

const canvas=document.getElementById('cert'),ctx=canvas.getContext('2d'),nome=document.getElementById('nome'),joke=document.getElementById('joke');
const frases=['Especialista em dizer “depende” com responsabilidade técnica.','Não sabe tudo. Em cibersegurança, isso já é um sinal de sanidade.','Aprovado em humildade operacional e reprovado em soberba corporativa.','Tem experiência comprovada em abrir 37 abas antes de opinar.','Reconhecido por não transformar achismo em arquitetura.','Sobreviveu a reuniões onde a causa raiz era “ninguém sabe”.'];
const bg=new Image(); bg.decoding='async'; bg.src=IMG;
function fitFont(text){let s=86;ctx.font=`italic ${s}px Georgia, 'Times New Roman', serif`;while(ctx.measureText(text).width>760&&s>48){s-=3;ctx.font=`italic ${s}px Georgia, 'Times New Roman', serif`;}}
function draw(){ctx.clearRect(0,0,1536,1024);ctx.drawImage(bg,0,0,1536,1024);const v=nome.value.trim();if(!v)return;ctx.save();ctx.fillStyle='#071b34';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(255,255,255,.45)';ctx.shadowBlur=3;fitFont(v);ctx.fillText(v,768,397);ctx.restore();}
function randomJoke(){joke.textContent=frases[Math.floor(Math.random()*frases.length)];}
function downloadPNG(){draw();const a=document.createElement('a');const safe=(nome.value.trim()||'sem-nome').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-zA-Z0-9_-]+/g,'-').replace(/^-|-$/g,'');a.download=`certificado-nao-especialista-${safe}.png`;a.href=canvas.toDataURL('image/png');a.click();}
document.getElementById('gerar').addEventListener('click',()=>{draw();randomJoke();});
document.getElementById('png').addEventListener('click',downloadPNG);
document.getElementById('pdf').addEventListener('click',()=>{draw();setTimeout(()=>print(),50);});
document.getElementById('limpar').addEventListener('click',()=>{nome.value='';draw();randomJoke();nome.focus();});
nome.addEventListener('input',draw);nome.addEventListener('keydown',e=>{if(e.key==='Enter'){draw();randomJoke();}});bg.onload=draw;
})();
</script>
